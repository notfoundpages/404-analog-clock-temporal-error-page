<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404-analog-clock-temporal-error-page ~ notfoundpages</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="temporal-container">
    <div class="digit">4</div>

    <div class="clock-container">
      <div class="hand hour-hand" id="hr"></div>
      <div class="hand minute-hand" id="min"></div>
      <div class="hand second-hand" id="sec"></div>
      <div class="center-pin"></div>
    </div>

    <div class="digit">4</div>
  </div>

  <div class="ui-text">
    <div class="title">Temporal Desync</div>
    <div class="subtitle">The page you are looking for has been lost to the archives. But your local time remains
      synchronized.</div>
    <a href="/" class="btn">Realign to Present</a>
  </div>

  <script src="script.js"></script>
</body>

</html>
